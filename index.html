<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل دروس الإعلام الآلي - 2 متوسط</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
        .gradient-bg {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <header class="gradient-bg text-white py-10 px-4 text-center shadow-lg">
        <h1 class="text-3xl md:text-4xl font-bold mb-2">منصة أستاذ الإعلام الآلي</h1>
        <p class="text-blue-100 opacity-90">خاص بتلاميذ السنة الثانية متوسط - دروس الدعم والتقوية</p>
    </header>

    <main class="max-w-2xl mx-auto -mt-10 p-4">
        <div class="bg-white rounded-2xl shadow-xl p-6 md:p-10">
            
            <div class="flex items-center justify-center mb-8 border-b pb-4">
                <span class="text-4xl ml-3">💻</span>
                <h2 class="text-xl font-bold text-gray-700">استمارة حجز مقعد</h2>
            </div>

            <form action="https://formspree.io/f/xlgalqll" method="POST" class="space-y-6">
                
                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-2">اسم ولقب التلميذ(ة):</label>
                    <input type="text" name="student_name" required 
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-400 outline-none transition-all"
                        placeholder="اكتب اسمك هنا...">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-2">القسم (في المؤسسة):</label>
                    <select name="class_section" required 
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">
                        <option value="">اختر قسمك...</option>
                        <option>2 متوسط 1</option>
                        <option>2 متوسط 2</option>
                        <option>2 متوسط 3</option>
                        <option>2 متوسط 4</option>
                        <option>أخرى</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-2">رقم هاتف الولي (للتواصل):</label>
                    <input type="tel" name="parent_phone" required 
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-400 outline-none"
                        placeholder="06 / 07 / 05 ........">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-2">هل لديك حاسوب في البيت؟</label>
                    <div class="flex gap-4">
                        <label class="flex items-center cursor-pointer">
                            <input type="radio" name="has_pc" value="نعم" class="ml-2"> نعم
                        </label>
                        <label class="flex items-center cursor-pointer">
                            <input type="radio" name="has_pc" value="لا" class="ml-2"> لا
                        </label>
                    </div>
                </div>

                <button type="submit" 
                    class="w-full gradient-bg text-white font-bold py-4 rounded-xl shadow-blue-200 shadow-lg hover:opacity-90 transform transition active:scale-95 text-lg">
                    إرسال الطلب للأستاذ
                </button>

            </form>

            <div class="mt-8 pt-6 border-t text-center text-sm text-gray-400">
                سيتم تحديد القوائم حسب الأماكن المتوفرة
            </div>
        </div>
    </main>

    <footer class="text-center py-8 text-gray-500 text-sm">
        تحت إشراف أستاذ المادة &copy; 2026
    </footer>

</body>
</html>
