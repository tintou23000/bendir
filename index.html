<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كشف نقاط التلاميذ</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div id="app" class="max-w-md w-full bg-white rounded-xl shadow-lg p-8">
        <h1 class="text-2xl font-bold text-center text-blue-600 mb-6">استعلام عن النتائج</h1>

        <div v-if="!result" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">رقم التعريف</label>
                <input v-model="searchId" type="text" placeholder="أدخل رقمك هنا" 
                       class="mt-1 block w-full border border-gray-300 rounded-md p-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">تاريخ الميلاد</label>
                <input v-model="searchDob" type="date" 
                       class="mt-1 block w-full border border-gray-300 rounded-md p-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
            <button @click="findStudent" 
                    class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded-md hover:bg-blue-700 transition">
                بحث عن النتيجة
            </button>
            <p v-if="error" class="text-red-500 text-sm text-center">{{ error }}</p>
        </div>

        <div v-else class="space-y-4 animate-fade-in">
            <div class="border-b pb-2 text-center">
                <h2 class="text-xl font-bold text-gray-800">{{ result.firstName }} {{ result.lastName }}</h2>
                <p class="text-sm text-gray-500">القسم: {{ result.className }}</p>
            </div>
            
            <div class="grid grid-cols-3 gap-2 text-center">
                <div class="bg-blue-50 p-2 rounded">
                    <p class="text-xs text-blue-600 font-bold">النشاطات</p>
                    <p class="text-lg font-bold">{{ result.activities }}</p>
                </div>
                <div class="bg-green-50 p-2 rounded">
                    <p class="text-xs text-green-600 font-bold">الفرض</p>
                    <p class="text-lg font-bold">{{ result.test }}</p>
                </div>
                <div class="bg-purple-50 p-2 rounded">
                    <p class="text-xs text-purple-600 font-bold">الاختبار</p>
                    <p class="text-lg font-bold">{{ result.exam }}</p>
                </div>
            </div>

            <div class="bg-gray-50 p-3 rounded text-center italic text-gray-700">
                "{{ result.remarks }}"
            </div>

            <button @click="result = null; searchId = ''; searchDob = ''" 
                    class="w-full bg-gray-200 text-gray-700 py-2 px-4 rounded-md hover:bg-gray-300 transition">
                بحث جديد
            </button>
        </div>
    </div>

    <script>
        const { createApp, ref } = Vue;

        createApp({
            setup() {
                const searchId = ref('');
                const searchDob = ref('');
                const result = ref(null);
                const error = ref(null);

                const findStudent = async () => {
                    try {
                        const response = await fetch('data.json');
                        const data = await response.json();
                        
                        const student = data.find(s => s.id === searchId.value && s.dob === searchDob.value);

                        if (student) {
                            result.value = student;
                            error.value = null;
                        } else {
                            error.value = "المعلومات غير مطابقة، تأكد من البيانات.";
                            result.value = null;
                        }
                    } catch (e) {
                        error.value = "فشل تحميل البيانات. تأكد من وجود ملف data.json";
                    }
                };

                return { searchId, searchDob, result, error, findStudent };
            }
        }).mount('#app');
    </script>
</body>
</html>
